services:
  redis:
    image: redis:7-alpine
    container_name: upstride-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  api:
    image: ghcr.io/mohammedbilalns/upstride-backend-api:latest
    container_name: upstride-backend
    pull_policy: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    image: ghcr.io/mohammedbilalns/upstride-backend-worker:latest
    container_name: upstride-backend-worker
    pull_policy: always
    env_file:
      - .env
    command: pnpm run start:worker
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
